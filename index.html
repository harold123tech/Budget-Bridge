<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Bridge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Lora:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <span class="hamburger">&#9776;</span>
            <h1 class="logo">Budget Bridge</h1>
        </div>
        <div class="auth-links">
            <a href="#">Login</a> / <a href="#">Register</a>
        </div>
    </header>

    <main class="hero">
        <h2 class="hero-text">
            Welcome to <span class="brand-blue">Budget Bridge</span>, a website where everyone will understand their finances.
        </h2>

        <nav class="button-container">
            <button class="nav-btn">
                <span class="icon">🐷</span>
                Savings
            </button>
            <button class="nav-btn">
                <span class="icon">⚙️</span>
                Budget
            </button>
            <button class="nav-btn">
                <span class="icon">💰</span>
                Loans
            </button>
        </nav>
    </main>

    <footer class="footer-bar"></footer>

</body>
</html>
