<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Bridge</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&family=Lora:wght@700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="left-section">
            <button class="menu-toggle" id="menuBtn">
                <span class="hamburger">&#9776;</span>
            </button>
            
            <div class="logo-wrapper">
                <img src="images/logo.png" alt="Budget Bridge Logo" class="brand-logo">
                <h1 class="logo-text">udget Bridge</h1>
            </div>
        </div>

        <div class="auth-links">
            <a href="login.html">Login</a> / <a href="register.html" class="register-link">Register</a>
        </div>
    </header>

    <nav class="side-menu" id="sideMenu">
        <a href="#savings">Savings</a>
        <a href="#budget">Budget</a>
        <a href="#loans">Loans</a>
    </nav>

    <main class="hero">
    <h2 class="hero-text">
        Welcome to <span class="brand-accent">Budget Bridge</span>, a website where everyone will understand their finances.
    </h2>

    <div class="bank-partners-space">
        <p class="placeholder-text">[ Bank Partner Logos Will Go Here ]</p> 
    </div>

    <nav class="button-container">
        <button class="nav-btn">
            <span class="icon">🐷</span>
            Savings
        </button>
        <button class="nav-btn">
            <span class="icon">⚙️</span>
            Budget
        </button>
        <button class="nav-btn">
            <span class="icon">💰</span>
            Loans
        </button>
    </nav>
    </main>

    <footer class="footer-bar"></footer>

    <script>
        // Simple script to toggle the menu
        const menuBtn = document.getElementById('menuBtn');
        const sideMenu = document.getElementById('sideMenu');

        menuBtn.addEventListener('click', () => {
            sideMenu.classList.toggle('active');
        });
    </script>
</body>
</html>
