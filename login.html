<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Bridge - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="register-body"> <div class="register-card">
        <div class="logo-container">
            <img src="images/logo.png" alt="Budget Bridge Logo" class="logo-img">
        </div>

        <h2 class="register-title">Login</h2>

        <form id="loginForm">
            <div class="form-group">
                <input type="email" id="loginEmail" class="form-input" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" class="form-input" placeholder="Password" required>
            </div>
            
            <div class="form-group">
                <button type="submit" class="register-submit-btn">Sign In</button>
            </div>
        </form>

        <p style="margin-top: 20px; font-weight: 700; font-size: 1.1rem;">
            Don't have an account? <a href="register.html" style="color: var(--brand-color); text-decoration: none;">Register here</a>
        </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
      // Your Live Firebase App Settings
      const firebaseConfig = {
        apiKey: "AIzaSyDS5r7RaNUgOO4Q-koKj_7qhVknNhbSz8I",
        authDomain: "budget-bridge-dc5ab.firebaseapp.com",
        projectId: "budget-bridge-dc5ab",
        storageBucket: "budget-bridge-dc5ab.firebasestorage.app",
        messagingSenderId: "685535098423",
        appId: "1:685535098423:web:5c8f388500524a3592b1b2",
        measurementId: "G-DPMQ3P0LX5"
      };
      
      // Initialize Firebase engine
      firebase.initializeApp(firebaseConfig);

      // The "Messenger" script that handles the login action
      const loginForm = document.getElementById('loginForm');

      loginForm.addEventListener('submit', (e) => {
          e.preventDefault(); // Stop the screen from auto-refreshing

          // Collect typed email and password values
          const email = document.getElementById('loginEmail').value;
          const password = document.getElementById('loginPassword').value;

          // Tell Firebase to check the cloud filing cabinet for this user
          firebase.auth().signInWithEmailAndPassword(email, password)
              .then((userCredential) => {
                  // Successful login! Open up their personal dashboard view
                  window.location.href = "dashboard.html"; 
              })
              .catch((error) => {
                  // If password is wrong or user doesn't exist, show the error alert
                  alert(error.message);
              });
      });
    </script>
</body>
</html>
