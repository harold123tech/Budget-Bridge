<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Bridge - Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="register-body">

    <div class="register-card">
        <div class="logo-container">
            <img src="images/Logo.png" alt="Budget Bridge Logo" class="logo-img">
        </div>

        <h2 class="register-title">Register</h2>

        <form id="regForm">
            <div class="form-group">
                <input type="text" id="regName" class="form-input" placeholder="Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" class="form-input" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" class="form-input" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" id="regConfirmPassword" class="form-input" placeholder="Confirm Password" required>
            </div>
            
            <div class="form-group">
                <button type="submit" class="register-submit-btn">Create Account</button>
            </div>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <script>
      // Your Live Firebase App Settings
      const firebaseConfig = {
        apiKey: "AIzaSyDS5r7RaNUgOO4Q-koKj_7qhVknNhbSz8I",
        authDomain: "budget-bridge-dc5ab.firebaseapp.com",
        projectId: "budget-bridge-dc5ab",
        storageBucket: "budget-bridge-dc5ab.firebasestorage.app",
        messagingSenderId: "685535098423",
        appId: "1:685535098423:web:5c8f388500524a3592b1b2",
        measurementId: "G-DPMQ3P0LX5"
      };
      
      // Turn on Firebase engine
      firebase.initializeApp(firebaseConfig);

      // The "Messenger" code that watches the form
      const registrationForm = document.getElementById('regForm');

      registrationForm.addEventListener('submit', (e) => {
          e.preventDefault(); // Stop the screen from auto-refreshing

          // Collect typed values
          const name = document.getElementById('regName').value;
          const email = document.getElementById('regEmail').value;
          const password = document.getElementById('regPassword').value;
          const confirmPassword = document.getElementById('regConfirmPassword').value;

          // Check if passwords match
          if (password !== confirmPassword) {
              alert("Passwords do not match!");
              return;
          }
            // Send data to your cloud filing cabinet
            firebase.auth().createUserWithEmailAndPassword(email, password)
                .then((userCredential) => {
                    // --- NEW CODE STARTS HERE ---
                    // This updates the user's profile with the real name they typed in
                    userCredential.user.updateProfile({
                        displayName: name
                    }).then(() => {
                        alert("Account created successfully!");
                        window.location.href = "dashboard.html"; // Redirects to dashboard page
                    }).catch((profileError) => {
                        console.log("Error saving name: ", profileError);
                        // Even if the name update fails, still send them through
                        window.location.href = "dashboard.html"; 
                    });
                    // --- NEW CODE ENDS HERE ---
                })
                .catch((error) => {
                    alert(error.message);
                });
        });
    </script>
</body>
</html>
